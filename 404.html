<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Nifty Option Trading Dashboard</title>
    <style>
        /* =============================================
                   ROOT VARIABLES & RESET
                ============================================= */
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111b2e;
            --bg-card: #0d1624;
            --border-color: #1a2332;
            --text-primary: #e0e6ed;
            --text-secondary: #6b7a8f;
            --text-muted: #3d4a5f;
            --green: #00d4aa;
            --green-bg: #00d4aa20;
            --red: #ff4757;
            --red-bg: #ff475720;
            --gold: #ffd700;
            --gold-bg: #ffd70020;
            --blue: #00d4ff;
            --blue-gradient: linear-gradient(135deg, #00d4ff, #7b2ffc);
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 12px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* =============================================
                   CONTAINER
                ============================================= */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* =============================================
                   HEADER
                ============================================= */
        .header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: clamp(20px, 5vw, 28px);
            background: var(--blue-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            width: 100%;
        }

        .header-controls select,
        .header-controls input,
        .header-controls button {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: clamp(12px, 1.8vw, 14px);
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            min-width: 80px;
        }

        .header-controls select:focus,
        .header-controls input:focus {
            outline: none;
            border-color: var(--blue);
        }

        .header-controls button {
            background: var(--blue-gradient);
            border: none;
            font-weight: 600;
            flex: 0.5;
            min-width: 70px;
        }

        .header-controls button:active {
            transform: scale(0.95);
        }

        .header-controls select option {
            background: var(--bg-primary);
        }

        /* =============================================
                   STATS CARDS
                ============================================= */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 14px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:active {
            transform: scale(0.97);
        }

        .stat-card .label {
            font-size: clamp(9px, 1.5vw, 12px);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: clamp(18px, 5vw, 26px);
            font-weight: 700;
            margin-top: 4px;
            line-height: 1.2;
            transition: var(--transition);
        }

        .stat-card .value.green {
            color: var(--green);
        }
        .stat-card .value.red {
            color: var(--red);
        }
        .stat-card .value.gold {
            color: var(--gold);
        }

        /* =============================================
                   TABLE CONTAINER
                ============================================= */
        .table-container {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 8px;
        }

        .table-header h2 {
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: 600;
        }

        .table-header .count {
            color: var(--text-secondary);
            font-size: clamp(11px, 1.5vw, 14px);
        }

        /* =============================================
                   TABLE (Mobile Optimized)
                ============================================= */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-height: 70vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(11px, 1.6vw, 14px);
            min-width: 700px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: var(--bg-card);
            padding: 10px 12px;
            text-align: left;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: clamp(9px, 1.2vw, 12px);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr {
            transition: var(--transition);
        }

        tr:active {
            background: var(--bg-card);
        }

        /* =============================================
                   BADGES
                ============================================= */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: clamp(9px, 1.2vw, 12px);
            font-weight: 600;
            white-space: nowrap;
        }

        .badge.buy {
            background: var(--green-bg);
            color: var(--green);
        }
        .badge.sell {
            background: var(--red-bg);
            color: var(--red);
        }
        .badge.win {
            background: var(--green-bg);
            color: var(--green);
        }
        .badge.loss {
            background: var(--red-bg);
            color: var(--red);
        }
        .badge.open {
            background: var(--gold-bg);
            color: var(--gold);
        }
        .badge.complete {
            background: var(--green-bg);
            color: var(--green);
        }

        /* =============================================
                   P&L COLORING
                ============================================= */
        .pnl-positive {
            color: var(--green);
            font-weight: 600;
        }
        .pnl-negative {
            color: var(--red);
            font-weight: 600;
        }
        .pnl-neutral {
            color: var(--text-secondary);
        }

        /* =============================================
                   LOADING / ERROR / EMPTY
                ============================================= */
        .loading,
        .error,
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .loading .spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            color: var(--red);
        }

        .no-data {
            font-size: clamp(14px, 2vw, 18px);
        }

        .no-data .emoji {
            font-size: clamp(32px, 6vw, 48px);
            display: block;
            margin-bottom: 12px;
        }

        /* =============================================
                   STATUS BAR (Live Indicator)
                ============================================= */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: clamp(10px, 1.4vw, 13px);
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .status-dot.live {
            background: var(--green);
        }
        .status-dot.closed {
            background: var(--red);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .status-bar .live-text {
            color: var(--green);
            font-weight: 600;
        }

        /* =============================================
                   RESPONSIVE - TABLET
                ============================================= */
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }

            .header {
                flex-direction: row;
                align-items: center;
                flex-wrap: wrap;
            }

            .header-controls {
                width: auto;
                flex: 1;
                justify-content: flex-end;
            }

            .header-controls select,
            .header-controls input,
            .header-controls button {
                flex: 0 1 auto;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 14px;
            }

            .stat-card {
                padding: 18px 16px;
            }
        }

        /* =============================================
                   RESPONSIVE - DESKTOP
                ============================================= */
        @media (min-width: 1024px) {
            body {
                padding: 30px;
            }

            .stats {
                grid-template-columns: repeat(6, 1fr);
                gap: 16px;
            }

            .stat-card {
                padding: 20px;
            }

            table {
                font-size: 14px;
                min-width: 900px;
            }

            th,
            td {
                padding: 12px 18px;
            }

            tr:hover {
                background: var(--bg-card);
            }
        }

        /* =============================================
                   RESPONSIVE - SMALL PHONE
                ============================================= */
        @media (max-width: 400px) {
            body {
                padding: 8px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 10px 8px;
            }

            .stat-card .value {
                font-size: 16px;
            }

            .header-controls select,
            .header-controls input,
            .header-controls button {
                font-size: 11px;
                padding: 6px 10px;
                min-width: 60px;
            }

            table {
                font-size: 10px;
                min-width: 550px;
            }

            th,
            td {
                padding: 6px 8px;
            }

            .badge {
                font-size: 8px;
                padding: 2px 6px;
            }
        }

        /* =============================================
                   SCROLLBAR STYLING
                ============================================= */
        .table-scroll::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* =============================================
                   DARK MODE COMPATIBILITY
                ============================================= */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f0f2f5;
                --bg-secondary: #ffffff;
                --bg-card: #e8eaed;
                --border-color: #d0d4d9;
                --text-primary: #1a1a2e;
                --text-secondary: #5a6a7a;
                --text-muted: #8a9aae;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- =============================================
        HEADER
        ============================================= -->
        <header class="header">
            <div class="header-top">
                <h1>📊 Nifty Option Dashboard</h1>
                <span id="liveStatus" style="font-size:12px;color:var(--text-secondary);">
                    <span class="status-dot live" id="statusDot"></span>
                    <span id="statusText">Live</span>
                </span>
            </div>
            <div class="header-controls">
                <select id="tradeFilter" aria-label="Filter trades">
                    <option value="all">📋 All</option>
                    <option value="LONG_SPREAD">🟢 Buy</option>
                    <option value="SHORT_SPREAD">🔴 Sell</option>
                    <option value="COMPLETE">✅ Complete</option>
                    <option value="OPEN">🟡 Open</option>
                </select>
                <input type="date" id="dateFilter" aria-label="Filter by date" />
                <button onclick="fetchData()">🔄 Refresh</button>
            </div>
        </header>

        <!-- =============================================
        STATUS BAR
        ============================================= -->
        <div class="status-bar">
            <span>
                <span class="status-dot live" id="statusDot2"></span>
                <span id="lastUpdated">Last updated: --</span>
            </span>
            <span id="tradeCountDisplay">0 trades</span>
        </div>

        <!-- =============================================
        STATS CARDS
        ============================================= -->
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="label">📊 Total Trades</div>
                <div class="value" id="totalTrades">-</div>
            </div>
            <div class="stat-card">
                <div class="label">💰 Total P&L</div>
                <div class="value" id="totalPnl">-</div>
            </div>
            <div class="stat-card">
                <div class="label">🏆 Win Rate</div>
                <div class="value" id="winRate">-</div>
            </div>
            <div class="stat-card">
                <div class="label">🥇 Best Trade</div>
                <div class="value gold" id="bestTrade">-</div>
            </div>
            <div class="stat-card">
                <div class="label">💀 Worst Trade</div>
                <div class="value red" id="worstTrade">-</div>
            </div>
            <div class="stat-card">
                <div class="label">📂 Open Positions</div>
                <div class="value" id="openPositions">-</div>
            </div>
        </div>

        <!-- =============================================
        TRADE TABLE
        ============================================= -->
        <div class="table-container">
            <div class="table-header">
                <h2>📋 Trade History</h2>
                <span class="count" id="recordCount">0 records</span>
            </div>
            <div class="table-scroll" id="tableContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading trades...
                </div>
            </div>
        </div>

        <!-- =============================================
        FOOTER
        ============================================= -->
        <div style="text-align:center;padding:20px 0 10px;font-size:11px;color:var(--text-muted);">
            Data refreshes every 60 seconds &bull; <span id="footerTime"></span>
        </div>
    </div>

    <!-- =============================================
    JAVASCRIPT
    ============================================= -->
    <script>
        // =============================================
        // SUPABASE CONFIG
        // =============================================
        const SUPABASE_URL = 'https://telhbgrovugnfgegakvy.supabase.co';
        const SUPABASE_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbGhiZ3JvdnVnbmZnZWdha3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzQyNDQsImV4cCI6MjA5NzgxMDI0NH0.wn7NyKMruTZSDTzPH0syJp4Hc3CTiQhoSZIPReansZQ';

        // =============================================
        // STATE
        // =============================================
        let allTrades = [];
        let refreshInterval = null;

        // =============================================
        // FETCH DATA
        // =============================================
        async function fetchData() {
            const tableContainer = document.getElementById('tableContainer');
            tableContainer.innerHTML = `
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading trades...
                        </div>
                    `;

            try {
                const filter = document.getElementById('tradeFilter').value;
                const date = document.getElementById('dateFilter').value;

                // Build query
                let query = `${SUPABASE_URL}/rest/v1/trade_history?select=*&order=id.desc&limit=50`;

                if (filter !== 'all') {
                    if (filter === 'LONG_SPREAD' || filter === 'SHORT_SPREAD') {
                        query += `&trade_type=eq.${filter}`;
                    } else {
                        query += `&status=eq.${filter}`;
                    }
                }

                if (date) {
                    query += `&entry_time=gte.${date}T00:00:00&entry_time=lt.${date}T23:59:59`;
                }

                const response = await fetch(query, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                allTrades = await response.json();
                renderTable(allTrades);
                updateStats(allTrades);
                updateStatusBar(allTrades);

                document.getElementById('lastUpdated').textContent =
                    `Last updated: ${new Date().toLocaleTimeString('en-IN')}`;

            } catch (error) {
                console.error('Error fetching data:', error);
                tableContainer.innerHTML = `
                            <div class="error">
                                ❌ Failed to load trades<br>
                                <small style="color:var(--text-secondary);font-size:12px;">${error.message}</small>
                            </div>
                        `;
            }
        }

        // =============================================
        // RENDER TABLE
        // =============================================
        function renderTable(trades) {
            const tableContainer = document.getElementById('tableContainer');

            if (!trades || trades.length === 0) {
                tableContainer.innerHTML = `
                            <div class="no-data">
                                <span class="emoji">📭</span>
                                No trades found matching your criteria
                            </div>
                        `;
                document.getElementById('recordCount').textContent = '0 records';
                return;
            }

            let html = `
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Type</th>
                                    <th>Entry</th>
                                    <th>Entry Premium</th>
                                    <th>Exit Premium</th>
                                    <th>P&L (₹)</th>
                                    <th>P&L %</th>
                                    <th>Exit</th>
                                    <th>Status</th>
                                    <th>Time</th>
                                </tr>
                            </thead>
                            <tbody>
                        `;

            trades.forEach((t, index) => {
                const isWin = t.total_pnl > 0;
                const isLoss = t.total_pnl < 0;
                const isOpen = t.status === 'OPEN';

                const pnlClass = isWin ? 'pnl-positive' : isLoss ? 'pnl-negative' : 'pnl-neutral';
                const pnlSymbol = isWin ? '+' : isLoss ? '-' : '';
                const pnlDisplay = t.total_pnl !== null ? `${pnlSymbol}₹${t.total_pnl.toFixed(2)}` : '-';

                const typeClass = t.trade_type === 'LONG_SPREAD' ? 'buy' : 'sell';
                const typeLabel = t.trade_type === 'LONG_SPREAD' ? 'BUY' : 'SELL';

                const statusClass = isOpen ? 'open' : 'complete';
                const statusLabel = isOpen ? 'OPEN' : 'COMPLETE';

                const exitReason = t.exit_reason || '-';
                const exitPremium = t.exit_premium !== null ? `₹${t.exit_premium}` : '-';

                const entryTime = t.entry_time ? new Date(t.entry_time).toLocaleTimeString('en-IN', {
                    hour: '2-digit',
                    minute: '2-digit'
                }) : '-';

                // Highlight row based on P&L
                let rowStyle = '';
                if (isWin) rowStyle = 'style="border-left:3px solid var(--green);"';
                else if (isLoss) rowStyle = 'style="border-left:3px solid var(--red);"';
                else if (isOpen) rowStyle = 'style="border-left:3px solid var(--gold);"';

                html += `
                            <tr ${rowStyle}>
                                <td><strong>${t.trade_no || '-'}</strong></td>
                                <td><span class="badge ${typeClass}">${typeLabel}</span></td>
                                <td>${t.entry_price || '-'}</td>
                                <td>₹${t.entry_premium || 0}</td>
                                <td>${exitPremium}</td>
                                <td class="${pnlClass}">${pnlDisplay}</td>
                                <td class="${pnlClass}">${t.pnl_pct !== null ? (t.pnl_pct > 0 ? '+' : '') + t.pnl_pct.toFixed(1) + '%' : '-'}</td>
                                <td style="font-size:clamp(8px,1vw,11px);">${exitReason}</td>
                                <td><span class="badge ${statusClass}">${statusLabel}</span></td>
                                <td style="font-size:clamp(9px,1vw,11px);">${entryTime}</td>
                            </tr>
                        `;
            });

            html += `
                            </tbody>
                        </table>
                    `;

            tableContainer.innerHTML = html;
            document.getElementById('recordCount').textContent = `${trades.length} records`;
        }

        // =============================================
        // UPDATE STATS
        // =============================================
        function updateStats(trades) {
            if (!trades || trades.length === 0) {
                document.getElementById('totalTrades').textContent = '0';
                document.getElementById('totalPnl').textContent = '₹0';
                document.getElementById('totalPnl').className = 'value';
                document.getElementById('winRate').textContent = '0%';
                document.getElementById('bestTrade').textContent = '₹0';
                document.getElementById('worstTrade').textContent = '₹0';
                document.getElementById('openPositions').textContent = '0';
                return;
            }

            const total = trades.length;
            const completed = trades.filter(t => t.status === 'COMPLETE');
            const open = trades.filter(t => t.status === 'OPEN');

            const totalPnl = completed.reduce((sum, t) => sum + (t.total_pnl || 0), 0);
            const wins = completed.filter(t => t.total_pnl > 0);
            const losses = completed.filter(t => t.total_pnl < 0);

            const winRate = completed.length > 0 ? (wins.length / completed.length * 100) : 0;

            const pnls = completed.map(t => t.total_pnl || 0);
            const best = pnls.length > 0 ? Math.max(...pnls) : 0;
            const worst = pnls.length > 0 ? Math.min(...pnls) : 0;

            document.getElementById('totalTrades').textContent = total;

            const pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = `₹${totalPnl.toFixed(2)}`;
            pnlEl.className = `value ${totalPnl >= 0 ? 'green' : 'red'}`;

            document.getElementById('winRate').textContent = `${winRate.toFixed(1)}%`;
            document.getElementById('bestTrade').textContent = `₹${best.toFixed(2)}`;
            document.getElementById('worstTrade').textContent = `₹${worst.toFixed(2)}`;
            document.getElementById('openPositions').textContent = open.length;

            document.getElementById('tradeCountDisplay').textContent = `${total} trades`;
        }

        // =============================================
        // UPDATE STATUS BAR
        // =============================================
        function updateStatusBar(trades) {
            const hasOpen = trades.some(t => t.status === 'OPEN');
            const dot = document.getElementById('statusDot');
            const dot2 = document.getElementById('statusDot2');
            const text = document.getElementById('statusText');

            if (hasOpen) {
                dot.className = 'status-dot live';
                dot2.className = 'status-dot live';
                text.textContent = 'Live (Open Positions)';
            } else {
                dot.className = 'status-dot closed';
                dot2.className = 'status-dot closed';
                text.textContent = 'No Open Positions';
            }
        }

        // =============================================
        // AUTO REFRESH
        // =============================================
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(fetchData, 60000);
        }

        // =============================================
        // FOOTER TIME
        // =============================================
        function updateFooterTime() {
            document.getElementById('footerTime').textContent =
                new Date().toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
        }

        // =============================================
        // INIT
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateFilter').value = today;

            // Fetch data
            fetchData();

            // Start auto-refresh
            startAutoRefresh();

            // Update footer time
            updateFooterTime();
            setInterval(updateFooterTime, 10000);

            // Refresh on filter change
            document.getElementById('tradeFilter').addEventListener('change', fetchData);
            document.getElementById('dateFilter').addEventListener('change', fetchData);
        });
    </script>

</body>
</html>
